<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMAS Mumbai - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        
        .header {
            background: linear-gradient(to right, #2E3192, #4a4eb5);
            padding: 25px;
            text-align: center;
            position: relative;
        }
        
        .logo {
            font-size: 32px;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
        }
        
        .logo span.uc {
            color: #ff6b6b;
        }
        
        .tagline {
            background: #ff6b6b;
            padding: 8px;
            margin-top: 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            display: inline-block;
        }
        
        .content {
            padding: 30px;
        }
        
        .login-title {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .login-title h2 {
            font-size: 22px;
            font-weight: 700;
            color: #2E3192;
        }
        
        .status-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
            display: inline-block;
        }
        
        .status-text {
            text-align: center;
            font-size: 13px;
            color: #666;
            font-style: italic;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        
        input:focus {
            outline: none;
            border-color: #2E3192;
            box-shadow: 0 0 0 3px rgba(46, 49, 146, 0.1);
            background: white;
            transform: translateY(-2px);
        }
        
        .password-container {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #777;
            cursor: pointer;
        }
        
        .toggle-password:hover {
            color: #2E3192;
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(255, 107, 107, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }
        
        .login-btn:hover::before {
            left: 100%;
        }
        
        .message {
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        
        footer {
            margin-top: 30px;
            text-align: center;
            color: #555;
            font-size: 13px;
        }
        
        .connected {
            background: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        
        .error {
            background: #F44336;
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.5);
        }
        
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <span class="uc">UC</span>MAS
            </div>
            <div class="tagline">Education with a Difference</div>
        </div>
        
        <div class="content">
            <div class="login-title">
                <h2>Secure Login</h2>
                <span class="status-light" id="statusLight" title="Checking Connection..."></span>
            </div>
            <p class="status-text" id="statusText">Checking server connection...</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="emailInput">Student ID or Admin Email</label>
                    <input type="text" id="emailInput" placeholder="Enter your ID or email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-container">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            👁️
                        </button>
                    </div>
                </div>
                
                <button type="button" class="login-btn" onclick="handleLogin()" id="loginBtn">
                    Log In
                </button>
            </form>
            
            <div class="message" id="login-message"></div>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 Developed by Practice Buddy. All rights reserved.</p>
    </footer>

    <script>
    // Connection status simulation
    setTimeout(() => {
        const light = document.getElementById('statusLight');
        const text = document.getElementById('statusText');
        light.classList.add('connected');
        text.textContent = "Server: Connected";
    }, 1500);
    
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
    }
    
    function handleLogin() {
        const loginBtn = document.getElementById('loginBtn');
        const messageElement = document.getElementById('login-message');
        
        loginBtn.textContent = "Verifying...";
        loginBtn.disabled = true;
        
        // Simulate login process
        setTimeout(() => {
            messageElement.innerHTML = '<span style="color: #4CAF50;">Login successful! Redirecting...</span>';
            loginBtn.textContent = "Log In";
            loginBtn.disabled = false;
        }, 1500);
    }
    
    // Allow form submission with Enter key
    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
    </script>
</body>
</html>
