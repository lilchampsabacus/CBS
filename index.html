<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBS Education - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            /* Base white background */
            background-color: #ffffff;
            /* Multi-layer gradient matching the Franchise Meet theme */
            background-image: 
                /* Subtle technical grid overlay */
                linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px),
                /* Top-Right Indigo/Blue Glow */
                radial-gradient(circle at 100% 0%, #1a2a7b 0%, rgba(26, 42, 123, 0.4) 30%, transparent 70%),
                /* Bottom-Left Vibrant Red Glow */
                radial-gradient(circle at 0% 100%, #e31e24 0%, rgba(227, 30, 36, 0.3) 30%, transparent 70%);
            background-size: 40px 40px, 40px 40px, 100% 100%, 100% 100%;
            background-attachment: fixed;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-container {
            background: white;
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-field { transition: all 0.3s ease; }
        .input-field:focus { transform: translateY(-2px); }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4">

    <div class="login-card w-full max-w-md rounded-2xl shadow-2xl overflow-hidden fade-in-up">
        <div class="bg-indigo-600 p-8 text-center">
            <!-- Logo Section -->
            <div class="logo-container">
                <img src="download.png" alt="Logo" class="h-12 w-auto mx-auto" onerror="this.parentElement.style.display='none'">
            </div>
            
            <h1 class="text-2xl font-extrabold text-white tracking-wide uppercase">CBS Education</h1>
            <p class="text-indigo-200 text-sm font-semibold mt-1">Digital System</p>
        </div>

        <div class="p-8">
            <div class="text-center mb-8 relative">
                <h2 class="text-xl font-bold text-gray-800 inline-flex items-center gap-2">
                    Secure Login
                    <span id="statusLight" class="h-3 w-3 rounded-full bg-gray-400" title="Checking Connection..."></span>
                </h2>
                <p id="statusText" class="text-gray-500 text-xs mt-1 italic">Checking server connection...</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="emailInput" class="block text-sm font-bold text-gray-700 mb-1">Student ID or Admin Email</label>
                    <input type="text" id="emailInput" placeholder="Enter ID"
                        class="input-field w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-gray-700 bg-gray-50 placeholder-gray-400" required>
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="••••••••"
                            class="input-field w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-gray-700 bg-gray-50 placeholder-gray-400" required>
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-indigo-600">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="button" onclick="handleLogin()" id="loginBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all duration-300 transform active:scale-95 flex justify-center items-center gap-2">
                    <span>Log In</span>
                </button>
            </form>

            <div id="login-message" class="mt-4 text-center text-sm font-semibold min-h-[60px] flex items-center justify-center"></div>
        </div>
    </div>

    <footer class="mt-8 text-center text-gray-500 text-sm italic">
        <p>&copy; 2026 Developed by Practice Buddy. All rights reserved.</p>
    </footer>

    <script>
    const SUPABASE_URL = "https://offdxndcnsiejmwdznwb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_2nb0HWCrTlZ3RvyHDn5Rmg_yUoz6xBW";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkServerConnection() {
        const light = document.getElementById('statusLight');
        const text = document.getElementById('statusText');
        try {
            const response = await fetch(`${SUPABASE_URL}/auth/v1/health`);
            if (response.ok || response.status === 401) {
                light.className = "h-3 w-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]";
                text.innerHTML = "Server: <span class='text-green-600 font-bold'>Connected</span>";
            }
        } catch (e) {
            light.className = "h-3 w-3 rounded-full bg-red-500 status-pulse";
            text.innerHTML = "Server: <span class='text-red-600 font-bold'>Error</span>";
        }
    }
    checkServerConnection();

    function togglePassword() {
        const passwordInput = document.getElementById('password');
        passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin() {
        const rawInput = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('password').value.trim();
        const messageElement = document.getElementById('login-message');
        const loginBtn = document.getElementById('loginBtn');
        
        let emailInput = rawInput.includes('@') ? rawInput.toLowerCase() : rawInput.toUpperCase() + "@ucmas.in";

        messageElement.innerHTML = '';
        loginBtn.disabled = true;
        loginBtn.innerHTML = `<span>Verifying...</span>`;

        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email: emailInput, password: password });
            if (error) throw new Error("Invalid credentials.");

            const { data: profile, error: profileError } = await supabaseClient
                .from('profiles')
                .select('*') 
                .eq('id', data.user.id)
                .single();

            if (profileError) throw new Error("Profile sync failed.");

            const isCI = emailInput.toLowerCase().includes('ci@ucmas.in');
            const effectiveRole = isCI ? 'teacher' : profile.role;

            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('userId', data.user.id);
            sessionStorage.setItem('userRole', effectiveRole);
            sessionStorage.setItem('userName', profile.full_name);
            sessionStorage.setItem('userState', profile.state || "");
            sessionStorage.setItem('userRegion', profile.region || "");
            sessionStorage.setItem('userEmail', emailInput);

            if (profile.role === 'national_ho') {
                messageElement.innerHTML = '<span class="text-indigo-600 font-bold">✅ Welcome, HQ Admin!</span>';
                setTimeout(() => window.location.href = 'national-dashboard.html', 1000);
            } 
            else if (profile.role === 'mumbai_ho') {
                messageElement.innerHTML = '<span class="text-indigo-600 font-bold">✅ Welcome, Mumbai Regional Head!</span>';
                setTimeout(() => window.location.href = 'mumbai-dashboard.html', 1000);
            }
            else if (profile.role === 'master_franchisee') {
                messageElement.innerHTML = `<span class="text-indigo-600 font-bold">✅ Welcome, State Head (${profile.state})!</span>`;
                setTimeout(() => window.location.href = 'mf-dashboard.html', 1000);
            } 
            else if (isCI) {
                messageElement.innerHTML = '<span class="text-indigo-600 font-bold">✅ Welcome, Course Instructor!</span>';
                setTimeout(() => window.location.href = 'teacher-dashboard.html', 1000);
            }
            else if (profile.role === 'unit_franchisee') {
                messageElement.innerHTML = '<span class="text-indigo-600 font-bold">✅ Welcome, Center Admin!</span>';
                setTimeout(() => window.location.href = 'unit-dashboard.html', 1000);
            } 
            else {
                sessionStorage.setItem('studentIdCode', rawInput.toUpperCase());
                sessionStorage.setItem('studentIdentifier', profile.full_name || "Student");
                messageElement.innerHTML = `<span class="text-green-600 font-bold">✅ Welcome, ${profile.full_name}!</span>`;
                setTimeout(() => window.location.href = 'practice_options.html', 1200);
            }

        } catch (err) {
            loginBtn.disabled = false;
            loginBtn.innerHTML = `<span>Log In</span>`;
            messageElement.innerHTML = `<span class="text-red-600 font-bold">❌ ${err.message}</span>`;
        }
    }
    document.getElementById('password').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>
